<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Legacy</title>

<style>
body {
    font-family: 'Courier New', Courier, monospace;
    background: #0f3460;
    color: #eee;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.game {
    width: 95%;
    max-width: 1200px;
    height: 90vh;
    padding: 30px;
    background: #1a1a2e;
    border: 2px solid #e94560;
    border-radius: 12px;
    box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
    display: flex;
    flex-direction: column;
}

h1 {
    text-align: center;
    margin-top: 0;
    margin-bottom: 25px;
    color: #e94560;
    font-size: 2.5rem;
    text-transform: uppercase;
    letter-spacing: 4px;
}

.stats {
    display: flex;
    justify-content: space-around;
    margin-bottom: 20px;
    font-size: 20px;
    background: #16213e;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #0f3460;
}

.output {
    background: #000;
    flex-grow: 1;
    overflow-y: auto;
    padding: 25px;
    margin-bottom: 25px;
    border: 2px solid #e94560;
    border-radius: 12px;
    font-size: 26px;
    line-height: 1.6;
    box-shadow: inset 0 0 20px rgba(233, 69, 96, 0.2);
}

.message {
    margin-bottom: 15px;
    white-space: pre-wrap;
}

.input-row {
    display: flex;
    background: #16213e;
    padding: 15px;
    border-radius: 12px;
    border: 2px solid #0f3460;
    gap: 15px;
}

input {
    flex: 1;
    padding: 15px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 22px;
    border: 1px solid #444;
    background: #222;
    color: #eee;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.3s;
}

input:focus {
    border-color: #e94560;
}

button {
    padding: 15px 45px;
    font-size: 22px;
    background: #e94560;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: background 0.3s, transform 0.1s, box-shadow 0.3s;
}

button:hover {
    background: #ff5e78;
    box-shadow: 0 0 15px rgba(233, 69, 96, 0.5);
}

button:active {
    transform: scale(0.98);
}
</style>
</head>

<body>
<div class="game">

<h1>Our Legacy</h1>

<div class="stats">
    <div>HP: <span id="statHp">-</span></div>
    <div>MP: <span id="statMp">-</span></div>
    <div>Gold: <span id="statGold">-</span></div>
    <div>Lv: <span id="statLevel">-</span></div>
</div>

<div class="output" id="gameOutput">
    <div class="message">Game loading...</div>
</div>

<div class="input-row" id="gameInputContainer">
    <input type="text" id="gameInput" placeholder="Type here..." autocomplete="off">
    <button id="submitBtn">Enter</button>
</div>

</div>

<script type="module">
import { Game } from './main.js';

let game;

const output = document.getElementById('gameOutput');
const input = document.getElementById('gameInput');
const button = document.getElementById('submitBtn');

const statHp = document.getElementById('statHp');
const statMp = document.getElementById('statMp');
const statGold = document.getElementById('statGold');
const statLevel = document.getElementById('statLevel');

function print(text, color) {
    if (color === 'clear') {
        output.innerHTML = '';
        return;
    }

    const div = document.createElement('div');
    div.className = 'message';
    
    if (typeof text === 'string' && (text.includes('color:') || text.includes('font-weight:'))) {
        const parts = text.split(/(color: #[0-9a-fA-F]{6}|font-weight: bold)/);
        let currentStyles = {};
        
        for (let i = 0; i < parts.length; i++) {
            const part = parts[i];
            if (!part) continue;
            
            if (part.startsWith('color: #')) {
                currentStyles.color = part.split(' ')[1];
            } else if (part === 'font-weight: bold') {
                currentStyles.fontWeight = 'bold';
            } else {
                const span = document.createElement('span');
                Object.assign(span.style, currentStyles);
                span.textContent = part;
                div.appendChild(span);
            }
        }
    } else {
        div.textContent = text;
        if (color) {
            if (color.includes(';')) {
                const styles = color.split(';');
                styles.forEach(s => {
                    const [prop, val] = s.split(':');
                    if (prop && val) div.style[prop.trim()] = val.trim();
                });
            } else if (color.startsWith('color:')) {
                div.style.color = color.split(':')[1].trim();
            } else if (color.startsWith('font-weight:')) {
                div.style.fontWeight = color.split(':')[1].trim();
            }
        }
    }
    
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
}

function handleInput() {
    const value = input.value.trim();
    if (!value) return;
    input.value = "";
    input.blur();
    game?.handleInput(value);
}

button.onclick = handleInput;
input.addEventListener("keydown", e => {
    if (e.key === "Enter") handleInput();
});

function updateStats() {
    if (!game?.player) return;
    statHp.textContent = game.player.hp + "/" + game.player.maxHp;
    statMp.textContent = game.player.mp + "/" + game.player.maxMp;
    statGold.textContent = game.player.gold;
    statLevel.textContent = game.player.level;
}

window.addEventListener("load", async () => {
    game = new Game();
    game.printCallback = (text, color) => {
        print(text, color);
        updateStats();
    };
    await game.init();
    output.innerHTML = "";
    await game.run();
});
</script>

</body>
</html>

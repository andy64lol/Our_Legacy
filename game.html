<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Legacy - Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: #0a0a0f;
      color: #e0e0e0;
    }

    #game-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      padding: 10px;
    }

    #game-output {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid #333;
      border-radius: 4px;
      margin-bottom: 10px;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.4;
    }

    /* Scrollbar styling */
    #game-output::-webkit-scrollbar {
      width: 8px;
    }
    #game-output::-webkit-scrollbar-track {
      background: #1a1a1a;
    }
    #game-output::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 4px;
    }
    #game-output::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    #input-area {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #prompt-label {
      color: #e94560;
      font-weight: bold;
      white-space: nowrap;
    }

    #game-input {
      flex: 1;
      padding: 10px 15px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 16px;
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 4px;
      outline: none;
    }

    #game-input:focus {
      border-color: #e94560;
      box-shadow: 0 0 5px rgba(233, 69, 96, 0.3);
    }

    /* Color classes for terminal output */
    .color-red { color: #ff6b6b; }
    .color-green { color: #51cf66; }
    .color-blue { color: #339af0; }
    .color-yellow { color: #fcc419; }
    .color-cyan { color: #22b8cf; }
    .color-magenta { color: #cc5de8; }
    .color-white { color: #e0e0e0; }
    .color-gray { color: #868e96; }
    .color-gold { color: #ffd43b; }
    .color-dark-gray { color: #495057; }
    
    .bold { font-weight: bold; }
    
    /* Loading screen */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #loading-screen h1 {
      color: #e94560;
      font-size: 2.5rem;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #333;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loading-message {
      margin-top: 20px;
      color: #868e96;
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <h1>⚔️ Our Legacy</h1>
    <div class="loading-spinner"></div>
    <p id="loading-message">Loading game...</p>
  </div>

  <div id="game-container">
    <div id="game-output"></div>
    <div id="input-area">
      <span id="prompt-label">></span>
      <input type="text" id="game-input" autocomplete="off" autofocus>
    </div>
  </div>

  <script type="module">
    import { initGame } from './main.js';

    // Game I/O handlers
    const outputElement = document.getElementById('game-output');
    const inputElement = document.getElementById('game-input');
    const loadingScreen = document.getElementById('loading-screen');
    const loadingMessage = document.getElementById('loading-message');

    // Input queue for async ask()
    let inputResolve = null;
    let inputQueue = [];

    // Handle input
    inputElement.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        const value = inputElement.value;
        inputElement.value = '';
        
        // Echo the input
        printLine(`> ${value}`, 'color-cyan');
        
        // Resolve the pending promise
        if (inputResolve) {
          const resolve = inputResolve;
          inputResolve = null;
          resolve(value);
        }
      }
    });

    // Create game instance with I/O handlers
    const gameInstance = {
      // Print to output area
      print(message) {
        // Handle color codes
        const coloredOutput = processColorCodes(message);
        printLine(coloredOutput);
      },
      
      // Ask for input (async)
      async ask(prompt) {
        // Show prompt
        this.print(prompt);
        
        // Focus input
        inputElement.focus();
        
        // Wait for input
        return new Promise((resolve) => {
          inputResolve = resolve;
        });
      },
      
      // Clear screen
      clear() {
        outputElement.innerHTML = '';
      },
      
      // Scroll to bottom
      scrollToBottom() {
        outputElement.scrollTop = outputElement.scrollHeight;
      }
    };

    // Process color codes in message
    function processColorCodes(message) {
      if (typeof message !== 'string') {
        message = String(message);
      }
      
      // Color code mappings (matching Colors from settings.js)
      const colorMap = {
        '\x1b[31m': 'color-red',
        '\x1b[32m': 'color-green',
        '\x1b[34m': 'color-blue',
        '\x1b[33m': 'color-yellow',
        '\x1b[36m': 'color-cyan',
        '\x1b[35m': 'color-magenta',
        '\x1b[37m': 'color-white',
        '\x1b[90m': 'color-dark-gray',
        '\x1b[0m': '',
        '\x1b[1m': 'bold',
        '\x1b[22m': ''
      };
      
      // Check if message contains ANSI codes
      let result = message;
      let hasAnsi = false;
      
      for (const [code, className] of Object.entries(colorMap)) {
        if (message.includes(code)) {
          hasAnsi = true;
          break;
        }
      }
      
      if (!hasAnsi) {
        // Simple text - escape HTML and return
        return escapeHtml(message);
      }
      
      // Process ANSI codes
      let currentClass = '';
      let processed = message;
      
      // Replace ANSI codes with HTML spans
      processed = processed.replace(/\x1b\[31m/g, '<span class="color-red">');
      processed = processed.replace(/\x1b\[32m/g, '<span class="color-green">');
      processed = processed.replace(/\x1b\[34m/g, '<span class="color-blue">');
      processed = processed.replace(/\x1b\[33m/g, '<span class="color-yellow">');
      processed = processed.replace(/\x1b\[36m/g, '<span class="color-cyan">');
      processed = processed.replace(/\x1b\[35m/g, '<span class="color-magenta">');
      processed = processed.replace(/\x1b\[37m/g, '<span class="color-white">');
      processed = processed.replace(/\x1b\[90m/g, '<span class="color-dark-gray">');
      processed = processed.replace(/\x1b\[1m/g, '<span class="bold">');
      processed = processed.replace(/\x1b\[22m/g, '</span>');
      processed = processed.replace(/\x1b\[0m/g, '</span>');
      
      // Escape remaining HTML
      processed = processed.replace(/</g, '<').replace(/>/g, '>');
      
      // Restore span tags
      processed = processed.replace(/<span class="([^&]+)">/g, '<span class="$1">');
      processed = processed.replace(/<\/span>/g, '</span>');
      
      return processed;
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Print a line to output
    function printLine(message, extraClass = '') {
      const line = document.createElement('div');
      if (extraClass) {
        line.className = extraClass;
      }
      line.innerHTML = message + '\n';
      outputElement.appendChild(line);
      gameInstance.scrollToBottom();
    }

    // Initialize the game
    async function startGame() {
      try {
        loadingMessage.textContent = 'Loading game data...';
        
        // Initialize game
        const game = await initGame(gameInstance);
        
        // Hide loading screen
        loadingScreen.style.display = 'none';
        
      } catch (error) {
        console.error('Game error:', error);
        loadingMessage.textContent = 'Error loading game: ' + error.message;
        loadingMessage.style.color = '#ff6b6b';
      }
    }

    // Start when DOM is ready
    document.addEventListener('DOMContentLoaded', startGame);
  </script>
</body>
</html>

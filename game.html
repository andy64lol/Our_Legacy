<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Legacy - Browser RPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        
        #game-container {
            width: 100%;
            max-width: 900px;
            background: linear-gradient(180deg, #12121a 0%, #0a0a0f 100%);
            border: 2px solid #3a3a5a;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 40px rgba(58, 58, 90, 0.3);
        }
        
        h1 {
            color: #00d4ff;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            font-size: 2.5em;
        }
        
        h2 {
            color: #ffd700;
            margin: 20px 0 10px 0;
            border-bottom: 1px solid #3a3a5a;
            padding-bottom: 5px;
        }
        
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-style: italic;
        }
        
        #output {
            background-color: #0d0d15;
            border: 1px solid #2a2a3a;
            border-radius: 4px;
            padding: 15px;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: 15px;
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 14px;
        }
        
        #output::-webkit-scrollbar {
            width: 8px;
        }
        
        #output::-webkit-scrollbar-track {
            background: #1a1a2a;
        }
        
        #output::-webkit-scrollbar-thumb {
            background: #3a3a5a;
            border-radius: 4px;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
        }
        
        #command-input {
            flex: 1;
            background-color: #0d0d15;
            border: 1px solid #3a3a5a;
            color: #00d4ff;
            padding: 12px 15px;
            font-family: inherit;
            font-size: 14px;
            border-radius: 4px;
            outline: none;
        }
        
        #command-input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }
        
        #submit-btn {
            background: linear-gradient(180deg, #00d4ff 0%, #0088aa 100%);
            color: #0a0a0f;
            border: none;
            padding: 12px 25px;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        #submit-btn:hover {
            background: linear-gradient(180deg, #00eeff 0%, #00aacc 100%);
            transform: translateY(-1px);
        }
        
        .menu-option {
            color: #00d4ff;
            margin: 5px 0;
        }
        
        .gold { color: #ffd700; }
        .hp { color: #ff4444; }
        .mp { color: #4488ff; }
        .exp { color: #aa44ff; }
        .rare { color: #4488ff; }
        .epic { color: #aa44ff; }
        .legendary { color: #ff8800; }
        .uncommon { color: #44ff44; }
        .common { color: #888888; }
        .danger { color: #ff4444; }
        .success { color: #44ff44; }
        .warning { color: #ffaa00; }
        
        .stat-bar {
            display: inline-block;
            background: #1a1a2a;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .stat-fill {
            height: 100%;
            transition: width 0.3s;
        }
        
        .hp-fill { background: linear-gradient(90deg, #ff4444, #ff6666); }
        .mp-fill { background: linear-gradient(90deg, #4488ff, #66aaff); }
        
        #stats-panel {
            background: #12121a;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            border: 1px solid #2a2a3a;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
        }
        
        .stat-label {
            color: #888;
        }
        
        .stat-value {
            color: #e0e0e0;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>⚔️ Our Legacy ⚔️</h1>
        <p class="subtitle">A Text-Based Fantasy RPG</p>
        
        <div id="stats-panel" style="display: none;">
            <div class="stat-row">
                <span class="stat-label">Name:</span>
                <span class="stat-value" id="stat-name">-</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Class:</span>
                <span class="stat-value" id="stat-class">-</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Level:</span>
                <span class="stat-value" id="stat-level">-</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">HP:</span>
                <span class="stat-value hp" id="stat-hp">-</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">MP:</span>
                <span class="stat-value mp" id="stat-mp">-</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Gold:</span>
                <span class="stat-value gold" id="stat-gold">-</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">EXP:</span>
                <span class="stat-value exp" id="stat-exp">-</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Area:</span>
                <span class="stat-value" id="stat-area">-</span>
            </div>
        </div>
        
        <div id="output"></div>
        
        <div class="input-area">
            <input type="text" id="command-input" placeholder="Enter command..." autocomplete="off">
            <button id="submit-btn">Enter</button>
        </div>
    </div>

    <script type="module">
        // Game State
        const gameState = {
            player: null,
            currentArea: "starting_village",
            gameData: {},
            inventory: [],
            gold: 100,
            level: 1,
            hp: 100,
            maxHp: 100,
            mp: 50,
            maxMp: 50,
            exp: 0,
            expToNext: 100,
            companions: [],
            equipment: {
                weapon: null,
                armor: null,
                offhand: null,
                accessory: null
            },
            missions: [],
            missionProgress: {},
            inBattle: false,
            currentEnemy: null
        };

        // DOM Elements
        const output = document.getElementById('output');
        const input = document.getElementById('command-input');
        const submitBtn = document.getElementById('submit-btn');
        const statsPanel = document.getElementById('stats-panel');

        // Override console.log to also output to game.html
        const originalConsoleLog = console.log;
        console.log = function(...args) {
            // Call original console.log to keep browser console working
            originalConsoleLog.apply(console, args);
            
            // Also print to game output
            const text = args.map(arg => {
                if (typeof arg === 'object') {
                    try {
                        return JSON.stringify(arg, null, 2);
                    } catch (e) {
                        return String(arg);
                    }
                }
                return String(arg);
            }).join(' ');
            
            print(text);
        };

        // Color codes for output
        const Colors = {
            RED: '\x1b[91m',
            GREEN: '\x1b[92m',
            YELLOW: '\x1b[93m',
            BLUE: '\x1b[94m',
            MAGENTA: '\x1b[95m',
            CYAN: '\x1b[96m',
            WHITE: '\x1b[97m',
            BOLD: '\x1b[1m',
            END: '\x1b[0m',
            GOLD: '\x1b[93m',
            
            // HTML mappings
            toHTML(color) {
                const map = {
                    '\x1b[91m': 'danger',
                    '\x1b[92m': 'success',
                    '\x1b[93m': 'warning',
                    '\x1b[94m': 'rare',
                    '\x1b[95m': 'epic',
                    '\x1b[96m': 'menu-option',
                    '\x1b[97m': '',
                    '\x1b[1m': 'BOLD'
                };
                return map[color] || '';
            }
        };

        // Load game data
        async function loadGameData() {
            try {
                const [areas, enemies, items, bosses, classes, missions, spells, effects] = await Promise.all([
                    fetch('data/areas.json').then(r => r.json()).catch(() => ({})),
                    fetch('data/enemies.json').then(r => r.json()).catch(() => ({})),
                    fetch('data/items.json').then(r => r.json()).catch(() => ({})),
                    fetch('data/bosses.json').then(r => r.json()).catch(() => ({})),
                    fetch('data/classes.json').then(r => r.json()).catch(() => ({})),
                    fetch('data/missions.json').then(r => r.json()).catch(() => ({})),
                    fetch('data/spells.json').then(r => r.json()).catch(() => ({})),
                    fetch('data/effects.json').then(r => r.json()).catch(() => ({}))
                ]);

                gameState.gameData = {
                    areas,
                    enemies,
                    items,
                    bosses,
                    classes,
                    missions,
                    spells,
                    effects
                };

                return true;
            } catch (e) {
                print(`Error loading game data: ${e.message}`);
                return false;
            }
        }

        // Print to output
        function print(text, color = '') {
            // Convert ANSI colors to HTML
            let html = text
                .replace(/\x1b\[91m/g, '<span class="danger">')
                .replace(/\x1b\[92m/g, '<span class="success">')
                .replace(/\x1b\[93m/g, '<span class="warning">')
                .replace(/\x1b\[94m/g, '<span class="rare">')
                .replace(/\x1b\[95m/g, '<span class="epic">')
                .replace(/\x1b\[96m/g, '<span class="menu-option">')
                .replace(/\x1b\[97m/g, '<span>')
                .replace(/\x1b\[1m/g, '<strong>')
                .replace(/\x1b\[0m/g, '</span>')
                .replace(/<\/strong>/g, '</strong></span>')
                .replace(/\n/g, '<br>');
            
            output.innerHTML += html + '<br>';
            output.scrollTop = output.scrollHeight;
        }

        // Clear output
        function clearOutput() {
            output.innerHTML = '';
        }

        // Update stats display
        function updateStatsDisplay() {
            if (!gameState.player) {
                statsPanel.style.display = 'none';
                return;
            }
            
            statsPanel.style.display = 'block';
            document.getElementById('stat-name').textContent = gameState.player.name;
            document.getElementById('stat-class').textContent = gameState.player.class;
            document.getElementById('stat-level').textContent = gameState.player.level;
            document.getElementById('stat-hp').textContent = `${gameState.player.hp}/${gameState.player.maxHp}`;
            document.getElementById('stat-mp').textContent = `${gameState.player.mp}/${gameState.player.maxMp}`;
            document.getElementById('stat-gold').textContent = gameState.player.gold;
            document.getElementById('stat-exp').textContent = `${gameState.player.exp}/${gameState.player.expToNext}`;
            
            const areaData = gameState.gameData.areas?.[gameState.currentArea] || {};
            document.getElementById('stat-area').textContent = areaData.name || gameState.currentArea;
        }

        // Display welcome screen
        function displayWelcome() {
            clearOutput();
            print('═'.repeat(50), '');
            print('              OUR LEGACY', 'menu-option');
            print('       A Text-Based Fantasy RPG', 'menu-option');
            print('═'.repeat(50), '');
            print('');
            print('Welcome, brave adventurer!');
            print('Your destiny awaits in this vast fantasy world.');
            print('');
            print('Choose your path wisely, for every decision shapes your legacy.');
            print('');
            print('═'.repeat(50), '');
            print('1. New Game', 'menu-option');
            print('2. Load Game', 'menu-option');
            print('3. Settings', 'menu-option');
            print('4. Quit', 'menu-option');
            print('');
        }

        // Create new game
        function createNewGame() {
            print('');
            print('Enter your hero\'s name:', 'warning');
        }

        // Process name input
        function processNameInput(name) {
            if (!name || name.trim() === '') {
                print('Please enter a valid name:', 'danger');
                return false;
            }
            
            gameState.player = {
                name: name.trim(),
                class: 'Warrior',
                level: 1,
                hp: 100,
                maxHp: 100,
                mp: 50,
                maxMp: 50,
                exp: 0,
                expToNext: 100,
                gold: 100,
                inventory: ['Iron Sword', 'Health Potion'],
                equipment: {
                    weapon: null,
                    armor: null,
                    offhand: null,
                    accessory: null
                },
                companions: [],
                currentArea: 'starting_village'
            };
            
            gameState.currentArea = 'starting_village';
            
            print('');
            print(`Welcome, ${gameState.player.name} the ${gameState.player.class}!`, 'success');
            print('Your adventure begins now!');
            print('');
            
            displayMainMenu();
            updateStatsDisplay();
            return true;
        }

        // Display main menu
        function displayMainMenu() {
            const areaData = gameState.gameData.areas?.[gameState.currentArea] || {};
            const areaName = areaData.name || gameState.currentArea;
            
            print('');
            print('═'.repeat(40), '');
            print(`📍 Location: ${areaName}`, 'menu-option');
            print('');
            print('1. Explore', 'menu-option');
            print('2. Character', 'menu-option');
            print('3. Travel', 'menu-option');
            print('4. Inventory', 'menu-option');
            print('5. Missions', 'menu-option');
            print('6. Fight Boss', 'menu-option');
            print('7. Tavern', 'menu-option');
            print('8. Shop', 'menu-option');
            print('9. Alchemy', 'menu-option');
            print('10. Elite Market', 'menu-option');
            print('11. Rest', 'menu-option');
            print('12. Companions', 'menu-option');
            print('13. Dungeons', 'menu-option');
            print('14. Challenges', 'menu-option');
            print('15. Pet Shop (Your Land)', 'menu-option');
            print('16. Settings', 'menu-option');
            print('17. Save Game', 'menu-option');
            print('18. Load Game', 'menu-option');
            print('0. Quit', 'menu-option');
            print('');
        }

        // Explore action
        function explore() {
            const areaData = gameState.gameData.areas?.[gameState.currentArea] || {};
            const possibleEnemies = areaData.possible_enemies || [];
            
            print(`Exploring ${areaData.name || gameState.currentArea}...`);
            
            // 70% chance of encounter
            if (Math.random() < 0.7 && possibleEnemies.length > 0) {
                const enemyName = possibleEnemies[Math.floor(Math.random() * possibleEnemies.length)];
                const enemyData = gameState.gameData.enemies?.[enemyName];
                
                if (enemyData) {
                    print('');
                    print(`⚔️ A wild ${enemyData.name} appears!`, 'danger');
                    startBattle(enemyData);
                }
            } else {
                print('You explored but found nothing.');
                
                // 30% chance to find gold
                if (Math.random() < 0.3) {
                    const goldFound = Math.floor(Math.random() * 20) + 5;
                    gameState.player.gold += goldFound;
                    print(`💰 You found ${goldFound} gold!`, 'warning');
                }
                
                // 40% chance to find materials
                if (Math.random() < 0.4) {
                    const materials = ['Herb', 'Leather', 'Iron Ore', 'Wood'];
                    const material = materials[Math.floor(Math.random() * materials.length)];
                    gameState.player.inventory.push(material);
                    print(`📦 Found: ${material}`, 'success');
                }
            }
            
            updateStatsDisplay();
        }

        // Start battle
        function startBattle(enemyData) {
            gameState.inBattle = true;
            gameState.currentEnemy = {
                name: enemyData.name,
                hp: enemyData.hp,
                maxHp: enemyData.hp,
                attack: enemyData.attack,
                defense: enemyData.defense,
                exp: enemyData.experience_reward,
                gold: enemyData.gold_reward
            };
            
            print('');
            print(`Enemy HP: ${gameState.currentEnemy.hp}/${gameState.currentEnemy.maxHp}`, 'danger');
            print('Your HP: ${gameState.player.hp}/${gameState.player.maxHp}', 'menu-option');
            print('');
            print('1. Attack', 'menu-option');
            print('2. Use Item', 'menu-option');
            print('3. Cast Spell', 'menu-option');
            print('4. Run Away', 'menu-option');
        }

        // Battle attack
        function battleAttack() {
            if (!gameState.inBattle || !gameState.currentEnemy) return;
            
            // Player attacks
            const playerDamage = Math.max(1, gameState.player.level * 5 + 10 - gameState.currentEnemy.defense);
            gameState.currentEnemy.hp -= playerDamage;
            
            print(`You attack for ${playerDamage} damage!`, 'success');
            
            if (gameState.currentEnemy.hp <= 0) {
                // Enemy defeated
                const expGain = gameState.currentEnemy.exp;
                const goldGain = gameState.currentEnemy.gold;
                
                gameState.player.exp += expGain;
                gameState.player.gold += goldGain;
                
                print('');
                print(`🎉 Victory! You defeated ${gameState.currentEnemy.name}!`, 'success');
                print(`💰 Gained ${goldGain} gold!`, 'warning');
                print(`✨ Gained ${expGain} EXP!`, 'epic');
                
                // Level up check
                if (gameState.player.exp >= gameState.player.expToNext) {
                    levelUp();
                }
                
                gameState.inBattle = false;
                gameState.currentEnemy = null;
                updateStatsDisplay();
                return;
            }
            
            // Enemy attacks
            const enemyDamage = Math.max(1, gameState.currentEnemy.attack - gameState.player.level * 2);
            gameState.player.hp -= enemyDamage;
            
            print(`${gameState.currentEnemy.name} attacks for ${enemyDamage} damage!`, 'danger');
            print(`Enemy HP: ${gameState.currentEnemy.hp}/${gameState.currentEnemy.maxHp}`, 'danger');
            print(`Your HP: ${gameState.player.hp}/${gameState.player.maxHp}`, 'menu-option');
            
            if (gameState.player.hp <= 0) {
                print('');
                print('💀 You have been defeated!', 'danger');
                print('You wake up at the nearest safe location...');
                gameState.player.hp = Math.floor(gameState.player.maxHp / 2);
                gameState.currentArea = 'starting_village';
                gameState.inBattle = false;
                gameState.currentEnemy = null;
            }
            
            updateStatsDisplay();
        }

        // Level up
        function levelUp() {
            gameState.player.level++;
            gameState.player.exp -= gameState.player.expToNext;
            gameState.player.expToNext = Math.floor(gameState.player.expToNext * 1.5);
            gameState.player.maxHp += 20;
            gameState.player.hp = gameState.player.maxHp;
            gameState.player.maxMp += 10;
            gameState.player.mp = gameState.player.maxMp;
            
            print('');
            print(`🎊 LEVEL UP! You are now level ${gameState.player.level}!`, 'legendary');
            print(`❤️ Max HP: ${gameState.player.maxHp}`, 'success');
            print(`💙 Max MP: ${gameState.player.maxMp}`, 'success');
        }

        // Display inventory
        function displayInventory() {
            print('');
            print('🎒 INVENTORY', 'menu-option');
            print('═'.repeat(30), '');
            print(`💰 Gold: ${gameState.player.gold}`, 'warning');
            print('');
            
            if (gameState.player.inventory.length === 0) {
                print('Your inventory is empty.');
                return;
            }
            
            // Group by type
            const items = {};
            for (const item of gameState.player.inventory) {
                const itemData = gameState.gameData.items?.[item] || {};
                const type = itemData.type || 'misc';
                if (!items[type]) items[type] = [];
                items[type].push(item);
            }
            
            for (const [type, itemList] of Object.entries(items)) {
                print(`${type.toUpperCase()}:`, 'menu-option');
                for (const item of itemList) {
                    const itemData = gameState.gameData.items?.[item] || {};
                    print(`  - ${item}`, itemData.rarity || '');
                }
            }
        }

        // Display character
        function displayCharacter() {
            const p = gameState.player;
            print('');
            print(`👤 ${p.name} (${p.class})`, 'menu-option');
            print('═'.repeat(30), '');
            print(`📊 Level: ${p.level} (${p.exp}/${p.expToNext} EXP)`);
            print(`❤️  HP: ${p.hp}/${p.maxHp}`);
            print(`💙 MP: ${p.mp}/${p.maxMp}`);
            print(`💰 Gold: ${p.gold}`);
            print(`⚔️  Attack: ${p.level * 5 + 10}`);
            print(`🛡️  Defense: ${p.level * 2 + 5}`);
            print(`👟 Speed: ${p.level * 2 + 3}`);
        }

        // Display travel menu
        function displayTravel() {
            const areaData = gameState.gameData.areas?.[gameState.currentArea] || {};
            const connections = areaData.connections || [];
            
            print('');
            print('🗺️ TRAVEL', 'menu-option');
            print(`Current: ${areaData.name || gameState.currentArea}`);
            print('');
            
            if (connections.length === 0) {
                print('No connected areas.');
                return;
            }
            
            for (let i = 0; i < connections.length; i++) {
                const connArea = gameState.gameData.areas?.[connections[i]] || {};
                print(`${i + 1}. ${connArea.name || connections[i]}`, 'menu-option');
                print(`   ${connArea.description || ''}`);
            }
        }

        // Rest action
        function rest() {
            const areaData = gameState.gameData.areas?.[gameState.currentArea] || {};
            
            if (!areaData.can_rest) {
                print(`You cannot rest in ${areaData.name || gameState.currentArea}.`, 'danger');
                return;
            }
            
            const cost = areaData.rest_cost || 10;
            
            if (gameState.player.gold < cost) {
                print(`Not enough gold! Need ${cost} gold.`, 'danger');
                return;
            }
            
            gameState.player.gold -= cost;
            gameState.player.hp = gameState.player.maxHp;
            gameState.player.mp = gameState.player.maxMp;
            
            print(`You rest at ${areaData.name} for ${cost} gold.`, 'success');
            print('❤️ HP fully restored!', 'success');
            print('💙 MP fully restored!', 'success');
            
            updateStatsDisplay();
        }

        // Process command
        function processCommand(cmd) {
            cmd = cmd.trim().toLowerCase();
            
            if (gameState.inBattle) {
                switch (cmd) {
                    case '1':
                    case 'attack':
                        battleAttack();
                        return;
                    case '4':
                    case 'run':
                    case 'run away':
                        print('You fled from battle!', 'warning');
                        gameState.inBattle = false;
                        gameState.currentEnemy = null;
                        return;
                    default:
                        displayMainMenu();
                        return;
                }
            }
            
            switch (cmd) {
                case '1':
                case 'explore':
                    if (!gameState.player) {
                        createNewGame();
                    } else {
                        explore();
                    }
                    break;
                    
                case '2':
                case 'character':
                case 'view':
                    if (gameState.player) {
                        displayCharacter();
                    } else {
                        createNewGame();
                    }
                    break;
                    
                case '3':
                case 'travel':
                    if (gameState.player) {
                        displayTravel();
                    }
                    break;
                    
                case '4':
                case 'inventory':
                case 'inv':
                    if (gameState.player) {
                        displayInventory();
                    }
                    break;
                    
                case '11':
                case 'rest':
                    if (gameState.player) {
                        rest();
                    }
                    break;
                    
                case 'new game':
                case 'new':
                    createNewGame();
                    break;
                    
                case 'help':
                case '?':
                    displayMainMenu();
                    break;
                    
                default:
                    if (!gameState.player) {
                        if (cmd) {
                            processNameInput(cmd);
                        } else {
                            displayWelcome();
                        }
                    } else {
                        print('Invalid command. Type "help" for menu.');
                    }
            }
        }

        // Event listeners
        submitBtn.addEventListener('click', () => {
            const cmd = input.value;
            input.value = '';
            if (cmd) {
                print(`> ${cmd}`, 'menu-option');
                processCommand(cmd);
            }
        });

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const cmd = input.value;
                input.value = '';
                if (cmd) {
                    print(`> ${cmd}`, 'menu-option');
                    processCommand(cmd);
                }
            }
        });

        // Initialize game
        async function init() {
            print('Loading game data...', 'warning');
            const loaded = await loadGameData();
            
            if (loaded) {
                displayWelcome();
            } else {
                print('Failed to load game data. Please refresh the page.', 'danger');
            }
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Legacy</title>

<style>
body {
    font-family: monospace;
    background: #111;
    color: #eee;
    margin: 0;
    display: flex;
    justify-content: center;
}

.game {
    width: 600px;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 10px;
}

.stats {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    font-size: 14px;
}

.output {
    background: #000;
    height: 400px;
    overflow-y: auto;
    padding: 10px;
    margin-bottom: 10px;
}

.message {
    margin-bottom: 5px;
}

.input-row {
    display: flex;
}

input {
    flex: 1;
    padding: 8px;
    font-family: monospace;
}

button {
    padding: 8px 12px;
}
</style>
</head>

<body>
<div class="game">

<h1>Our Legacy</h1>

<div class="stats">
    <div>HP: <span id="statHp">-</span></div>
    <div>MP: <span id="statMp">-</span></div>
    <div>Gold: <span id="statGold">-</span></div>
    <div>Lv: <span id="statLevel">-</span></div>
</div>

<div class="output" id="gameOutput">
    <div class="message">Game loading...</div>
</div>

<div class="input-row" id="gameInputContainer">
    <input type="text" id="gameInput" placeholder="Type here..." autocomplete="off">
    <button id="submitBtn">Enter</button>
</div>

</div>

<script type="module">
import { Game } from './main.js';

let game;

const output = document.getElementById('gameOutput');
const input = document.getElementById('gameInput');
const button = document.getElementById('submitBtn');

const statHp = document.getElementById('statHp');
const statMp = document.getElementById('statMp');
const statGold = document.getElementById('statGold');
const statLevel = document.getElementById('statLevel');

function print(text) {
    const div = document.createElement('div');
    div.className = 'message';
    div.textContent = text;
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
}

function handleInput() {
    const value = input.value.trim();
    if (!value) return;
    print("> " + value);
    input.value = "";
    game?.handleInput(value);
}

button.onclick = handleInput;
input.addEventListener("keydown", e => {
    if (e.key === "Enter") handleInput();
});

function updateStats() {
    if (!game?.player) return;
    statHp.textContent = game.player.hp + "/" + game.player.maxHp;
    statMp.textContent = game.player.mp + "/" + game.player.maxMp;
    statGold.textContent = game.player.gold;
    statLevel.textContent = game.player.level;
}

window.addEventListener("load", async () => {
    game = new Game();
    game.printCallback = (text, color) => {
        print(text);
        updateStats();
    };
    await game.init();
    output.innerHTML = "";
    await game.run();
});
</script>

</body>
</html>
